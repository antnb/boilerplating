<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDP Domain Treeview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a18; font-size: 13px; }
.page { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

h1 { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.sub { font-size: 12px; color: #888780; margin-bottom: 20px; }

.toolbar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.btn { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid #d3d1c7; background: #fff; color: #5f5e5a; transition: all .12s; }
.btn:hover { border-color: #888780; color: #1a1a18; }
.btn-active { background: #1a1a18; color: #fff; border-color: transparent; }
.sep { width: 1px; height: 20px; background: #d3d1c7; margin: 0 4px; }

/* legend */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; padding: 10px 14px; background: #fff; border-radius: 8px; border: 1px solid #e8e6e1; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #5f5e5a; }
.ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* tree container */
.tree { background: #fff; border-radius: 10px; border: 1px solid #e8e6e1; overflow: hidden; }

/* node row */
.node-row {
  display: flex; align-items: stretch; cursor: pointer;
  border-bottom: 1px solid #f1efe8;
  transition: background .1s;
  position: relative;
}
.node-row:last-child { border-bottom: none; }
.node-row:hover { background: #faf9f7; }
.node-row.selected { background: #f0f8ff; }

/* indent lines */
.indent { display: flex; flex-shrink: 0; }
.indent-seg {
  width: 28px; flex-shrink: 0; position: relative;
}
.indent-seg::before {
  content: '';
  position: absolute;
  left: 13px; top: 0; bottom: 0;
  width: 1px;
  background: #e8e6e1;
}
.indent-seg.last::after {
  content: '';
  position: absolute;
  left: 13px; top: 50%;
  width: 10px; height: 1px;
  background: #e8e6e1;
}

/* toggle arrow */
.toggle { width: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #b4b2a9; font-size: 9px; }
.toggle svg { transition: transform .15s; }
.toggle.open svg { transform: rotate(90deg); }

/* icon */
.icon { width: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }

/* label area */
.label-area { flex: 1; padding: 8px 8px 8px 2px; min-width: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.node-name { font-weight: 500; font-size: 12px; color: #1a1a18; white-space: nowrap; }
.node-type { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; color: #b4b2a9; }
.node-desc { font-size: 11px; color: #888780; }

/* badges */
.badges { display: flex; gap: 3px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
.badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; white-space: nowrap; }

/* zone badges */
.bz1 { background: #c0dd97; color: #27500a; }
.bz2 { background: #b5d4f4; color: #0c447c; }
.bz3 { background: #d3d1c7; color: #444441; }
.bz4 { background: #f5c4b3; color: #712b13; }
.bsc { background: #cecbf6; color: #3c3489; }

/* eeat badges */
.bee { background: #d5f0e8; color: #085041; }
.bex { background: #dff0c8; color: #27500a; }
.bea { background: #fde8c0; color: #633806; }
.bet { background: #d8ecfa; color: #0c447c; }

/* domain colors on node name */
.d-root   .node-name { color: #1d9e75; }
.d-plant  .node-name { color: #3b6d11; }
.d-comm   .node-name { color: #854f0b; }
.d-cont   .node-name { color: #534ab7; }
.d-social .node-name { color: #993c1d; }
.d-schema .node-name { color: #3c3489; }

/* domain entity header rows */
.entity-header .node-name { font-size: 13px; font-weight: 600; }
.domain-header { background: #faf9f7; }
.domain-header .node-name { font-size: 13px; font-weight: 700; letter-spacing: .01em; }

/* hidden */
.children { display: none; }
.children.open { display: block; }

/* count chip */
.count { font-size: 10px; padding: 1px 6px; background: #f1efe8; color: #888780; border-radius: 10px; }

/* detail panel */
.detail-panel {
  margin-top: 16px; padding: 16px; background: #fff;
  border-radius: 10px; border: 1px solid #e8e6e1;
  display: none;
}
.detail-panel.open { display: block; }
.dp-head { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.dp-desc { font-size: 12px; color: #5f5e5a; line-height: 1.6; margin-bottom: 12px; }
.dp-zones { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
.dp-label { font-size: 11px; color: #b4b2a9; margin-bottom: 4px; }
</style>
</head>

const EEAT_CLASS = { 'Exp':'bee', 'Ex':'bex', 'A':'bea', 'T':'bet' };
const EEAT_LABEL = { 'Exp':'Exp', 'Ex':'Ex', 'A':'Auth', 'T':'Trust' };
const DOMAIN_CLASS = { root:'d-root', plant:'d-plant', comm:'d-comm', cont:'d-cont', social:'d-social', schema:'d-schema' };

let activeFilter = '';
let selected = null;

function buildNode(node, depth, isLast, parentLines) {
  const hasChildren = node.children && node.children.length > 0;
  const wrapper = document.createElement('div');
  wrapper.dataset.id = node.id;
  wrapper.dataset.zones = (node.zones || []).join(',');

  // row
  const row = document.createElement('div');
  row.className = 'node-row ' + (DOMAIN_CLASS[node.domain] || '') + (node.domain_header ? ' domain-header' : '') + (node.entity ? ' entity-header' : '');

  // indent
  const indent = document.createElement('div');
  indent.className = 'indent';
  for (let i = 0; i < depth; i++) {
    const seg = document.createElement('div');
    seg.className = 'indent-seg' + (i === depth - 1 && isLast ? ' last' : '');
    if (parentLines[i] === false) seg.style.opacity = '0';
    indent.appendChild(seg);
  }
  row.appendChild(indent);

  // toggle
  const toggle = document.createElement('div');
  toggle.className = 'toggle' + (hasChildren ? '' : '');
  if (hasChildren) {
    toggle.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><path d="M2 1L6 4L2 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  } else {
    toggle.innerHTML = `<svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="1.5" fill="currentColor" opacity="0.3"/></svg>`;
  }
  row.appendChild(toggle);

  // icon
  if (node.icon) {
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.style.fontSize = '12px';
    icon.textContent = node.icon;
    row.appendChild(icon);
  }

  // label
  const la = document.createElement('div');
  la.className = 'label-area';

  const name = document.createElement('span');
  name.className = 'node-name';
  name.textContent = node.name;
  la.appendChild(name);

  if (node.type && depth > 0) {
    const type = document.createElement('span');
    type.className = 'node-type';
    type.textContent = node.type;
    la.appendChild(type);
  }

  if (hasChildren && depth > 0) {
    const cnt = document.createElement('span');
    cnt.className = 'count';
    cnt.textContent = node.children.length;
    la.appendChild(cnt);
  }

  // badges (right side)
  if ((node.zones && node.zones.length) || (node.eeat && node.eeat.length)) {
    const badges = document.createElement('div');
    badges.className = 'badges';
    (node.zones || []).forEach(z => {
      const b = document.createElement('span');
      b.className = 'badge ' + (ZONE_CLASS[z] || '');
      b.textContent = ZONE_LABEL[z];
      badges.appendChild(b);
    });
    (node.eeat || []).forEach(e => {
      const b = document.createElement('span');
      b.className = 'badge ' + (EEAT_CLASS[e] || '');
      b.textContent = EEAT_LABEL[e];
      badges.appendChild(b);
    });
    la.appendChild(badges);
  }

  row.appendChild(la);
  wrapper.appendChild(row);

  // children container
  let childrenEl = null;
  if (hasChildren) {
    childrenEl = document.createElement('div');
    childrenEl.className = 'children';
    node.children.forEach((child, i) => {
      const childIsLast = i === node.children.length - 1;
      const newParentLines = [...parentLines, !childIsLast];
      childrenEl.appendChild(buildNode(child, depth + 1, childIsLast, newParentLines));
    });
    wrapper.appendChild(childrenEl);

    // expand root by default
    if (depth === 0) {
      toggle.classList.add('open');
      childrenEl.classList.add('open');
    }

    row.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = childrenEl.classList.contains('open');
      childrenEl.classList.toggle('open', !isOpen);
      toggle.classList.toggle('open', !isOpen);
      showDetail(node);
    });
  } else {
    row.addEventListener('click', (e) => {
      e.stopPropagation();
      if (selected) selected.classList.remove('selected');
      selected = row;
      row.classList.add('selected');
      showDetail(node);
    });
  }

  return wrapper;
}

function showDetail(node) {
  const dp = document.getElementById('detail');
  if (!node.desc) { dp.classList.remove('open'); return; }
  dp.classList.add('open');
  const zoneBadges = (node.zones||[]).map(z => `<span class="badge ${ZONE_CLASS[z]||''}">${ZONE_LABEL[z]}</span>`).join('');
  const eeatBadges = (node.eeat||[]).map(e => `<span class="badge ${EEAT_CLASS[e]||''}">${EEAT_LABEL[e]}</span>`).join('');
  dp.innerHTML = `
    <div class="dp-head">${node.icon||''} ${node.name} <span style="font-size:11px;font-weight:400;color:#888780;margin-left:6px">${node.type||''}</span></div>
    <div class="dp-desc">${node.desc}</div>
    ${zoneBadges||eeatBadges ? `
      <div class="dp-label">UI Zones</div>
      <div class="dp-zones" style="margin-bottom:8px">${zoneBadges || '<span style="color:#b4b2a9;font-size:11px">–</span>'}</div>
      <div class="dp-label">E-E-A-T signal</div>
      <div class="dp-zones">${eeatBadges || '<span style="color:#b4b2a9;font-size:11px">–</span>'}</div>
    ` : ''}
  `;
}

function expandAll() {
  document.querySelectorAll('.children').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.toggle').forEach(el => el.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.toggle').forEach(el => el.classList.remove('open'));
}

function setFilter(btn, zone) {
  activeFilter = zone;
  document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('btn-active'));
  btn.classList.add('btn-active');
  applyFilter();
}

function applyFilter() {
  if (!activeFilter) {
    document.querySelectorAll('[data-id]').forEach(el => el.style.display = '');
    return;
  }
  document.querySelectorAll('[data-id]').forEach(el => {
    const zones = el.dataset.zones || '';
    const matches = zones.split(',').includes(activeFilter);
    // also show parents/containers
    el.style.display = matches || !el.dataset.zones ? '' : '';
  });
  // re-run: hide leaf nodes that don't match
  document.querySelectorAll('[data-id]').forEach(el => {
    const zones = el.dataset.zones || '';
    const zArr = zones.split(',').filter(Boolean);
    if (zArr.length === 0) return; // domain headers always show
    if (!zArr.includes(activeFilter)) {
      el.style.opacity = '0.3';
    } else {
      el.style.opacity = '1';
    }
  });
  expandAll();
}

// render
const tree = document.getElementById('tree');
TREE.forEach((root, i) => {
  tree.appendChild(buildNode(root, 0, i === TREE.length - 1, []));
});
</script>
</body>
</html>
